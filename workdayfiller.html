<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experience Details</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background-color: #ffffff;
            color: #020817;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            padding: 12px 24px;
            border-radius: 6px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            z-index: 50;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: slideIn 0.3s ease-out;
            max-width: 300px;
        }
        @keyframes slideIn {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast.success { border-left: 4px solid #22c55e; }
        .toast.error { border-left: 4px solid #ef4444; }

        /* Toggle switch */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #cbd5e1;
            border-radius: 24px;
            transition: 0.3s;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        input:checked + .toggle-slider { background-color: #0f172a; }
        input:checked + .toggle-slider:before { transform: translateX(20px); }

        /* Custom scrollbar */
        .overflow-x-auto::-webkit-scrollbar { height: 8px; }
        .overflow-x-auto::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .overflow-x-auto::-webkit-scrollbar-track { background-color: #f1f5f9; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Icons ---
        const CopyIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
        );
        const PlusIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        );

        // --- Components ---
        
        function Button({ children, className, variant = "default", size = "default", onClick, title }) {
            const baseStyles = "inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50";
            const variants = {
                default: "bg-slate-900 text-white hover:bg-slate-900/90 shadow",
                ghost: "hover:bg-slate-100 hover:text-slate-900",
            };
            const sizes = {
                default: "h-9 px-4 py-2",
                sm: "h-8 rounded-md px-3 text-xs",
                icon: "h-9 w-9",
            };
            const finalClass = `${baseStyles} ${variants[variant] || variants.default} ${sizes[size] || sizes.default} ${className || ""}`;
            return (
                <button className={finalClass} onClick={onClick} title={title}>
                    {children}
                </button>
            );
        }

        function Input({ value, onChange, placeholder, type = "text", className }) {
            return (
                <input
                    type={type}
                    value={value}
                    onChange={onChange}
                    placeholder={placeholder}
                    className={`flex h-9 w-full rounded-md border border-slate-200 bg-transparent px-3 py-1 text-sm shadow-sm transition-colors placeholder:text-slate-500 focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-slate-950 disabled:cursor-not-allowed disabled:opacity-50 ${className || ""}`}
                />
            );
        }

        function Textarea({ value, onChange, placeholder, className, maxLength }) {
            return (
                <textarea
                    value={value}
                    onChange={onChange}
                    placeholder={placeholder}
                    maxLength={maxLength}
                    className={`flex min-h-[60px] w-full rounded-md border border-slate-200 bg-transparent px-3 py-2 text-sm shadow-sm placeholder:text-slate-500 focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-slate-950 disabled:cursor-not-allowed disabled:opacity-50 ${className || ""}`}
                />
            );
        }

        // --- Toast System ---
        const ToastContext = React.createContext(null);

        function ToastProvider({ children }) {
            const [toasts, setToasts] = useState([]);
            const addToast = (message, type = "success") => {
                const id = Math.random().toString(36).substr(2, 9);
                setToasts((prev) => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setToasts((prev) => prev.filter((t) => t.id !== id));
                }, 3000);
            };
            return (
                <ToastContext.Provider value={{ addToast }}>
                    {children}
                    <div className="fixed bottom-0 right-0 p-4 flex flex-col gap-2 z-50">
                        {toasts.map((t) => (
                            <div key={t.id} className={`toast ${t.type}`}>
                                <span className="text-sm font-medium text-slate-900">{t.message}</span>
                            </div>
                        ))}
                    </div>
                </ToastContext.Provider>
            );
        }

        const useToast = () => React.useContext(ToastContext);

        // --- Main App ---

        function App() {
            const { addToast } = useToast();
            const [shortMode, setShortMode] = useState(false);

            const [rows, setRows] = useState([
                {
                    id: "1",
                    designation: "UX Architect",
                    organisation: "Srijan (now Material)",
                    from: "2022-02-09",
                    to: "2025-05-16",
                    description: "Led end-to-end UX activities including discovery workshops, requirement analysis, information architecture, persona, journey flows, wireframes, and prototypes.\n\nFacilitated problem-framing sessions with stakeholders, reducing design ambiguity and shortening overall iteration cycles by as much as 50%.\n\nCollaborated with PMs, engineering, and QA to ensure alignment from concept to delivery.\n\nAs part of RFP responses and soft pitches, defined design approach, deliverables, and timelines for multi-million dollar client engagements.\n\nInstitutionalised design consistency through process improvement and establishment of internal design library. Reduced discussion cycles with the development team in half.",
                    shortDescription: "Led UX for enterprise clients: discovery, IA, wireframes & prototypes. Shaped RFP responses for multi-million dollar engagements. Cut iteration cycles by 50% and halved dev discussion cycles.",
                    location: "Mumbai (remote)"
                },
                {
                    id: "2",
                    designation: "UX Architect",
                    organisation: "Trigyn Technologies",
                    from: "2021-04-01",
                    to: "2022-02-08",
                    description: "Owned UX for multiple key accounts, designing elegant solutions for complex workflows and enterprise applications. \n\nWorked on a foot-in-the-door opportunity that led to repeat multi-year engagement turning the division into a profit center. \n\nSupported recruitment, onboarding, and mentoring of the UX team. \n\nWorked on RFP responses contributing with UX scope definition, estimation, staffing and planning. \n\nCreated UX frameworks and design workflows improving delivery turnaround times. \n\nConducted user experience surveys that helped better define the problem statement.",
                    shortDescription: "Owned UX across key accounts; drove a foot-in-the-door win into a multi-year profit center. Built UX frameworks, led RFP contributions, and supported team recruitment and mentoring.",
                    location: "Mumbai"
                },
                {
                    id: "3",
                    designation: "Associate Manager - UX",
                    organisation: "Trigyn Technologies",
                    from: "2019-10-23",
                    to: "2021-03-31",
                    description: "Brought in design leadership to ongoing projects. Introduced user centric approach bringing in over 500k of improvements that helped \n\nimprove user engagement and reduce support tickets by over 40%.\n\nStarting building the UX team from scratch: pitched to leadership need for having a dedicated design team, defined the hiring pipeline, conducted interviews, and developed training materials, and helped mentor juniors and peers.\n\nDelivered Information Architecture, wireframes, and prototypes for both internal and client-facing projects",
                    shortDescription: "Introduced UX leadership; drove 500k+ in improvements, cut support tickets 40%. Built the UX team from scratch—hiring, training, mentoring—and delivered IA, wireframes & prototypes.",
                    location: "Mumbai"
                },
                {
                    id: "4",
                    designation: "Project Manager",
                    organisation: "Plum Tree",
                    from: "2018-12-17",
                    to: "2019-10-01",
                    description: "Managed 10+ high-priority projects, ensuring timely delivery while maintaining quality standards.\n\nActed as the primary client contact for updates, priorities, and change requests, leading bi-weekly calls with clients while running day-to-day coordination across internal teams.\n\nCoordinated between design, development and business teams to ensure smooth project execution.",
                    shortDescription: "Managed 10+ high-priority projects end-to-end. Served as primary client contact; led bi-weekly status calls and coordinated across design, development, and business teams.",
                    location: "Mumbai"
                },
                {
                    id: "5",
                    designation: "Design Lead",
                    organisation: "Zeuslearning",
                    from: "2014-07-01",
                    to: "2018-12-12",
                    description: "Led a team of designers across multiple product lines, providing guidance from concept to deployment.\n\nConducted requirement analysis and collaborated with business teams on SOWs & proposals.\n\nCreated IA, low-fidelity wireframes, and interactive prototypes for enterprise and education platforms.\n\nDelivered design walkthroughs for internal teams and clients.\n\nPerformed alpha/beta reviews to ensure adherence to design specifications.\n\nAuthored detailed design documentation to streamline development and reduce dependency.\n\nLed recruitment and training: designed tests, evaluated candidates, and created onboarding modules.",
                    shortDescription: "Led multi-product design team from concept to deployment. Created IA, wireframes & prototypes for enterprise platforms. Drove recruitment, training, and detailed design documentation.",
                    location: "Mumbai"
                },
                {
                    id: "6",
                    designation: "Senior Web Developer",
                    organisation: "Zeuslearning",
                    from: "2012-01-01",
                    to: "2014-06-30",
                    description: "Built frameworks for interactive science-based learning modules.\n\nLed a 10-member team building STEM-focused digital experiences.\n\nStreamlined development workflows improving delivery speed",
                    shortDescription: "Built frameworks for interactive STEM learning modules. Led a 10-member dev team and streamlined workflows to improve delivery speed.",
                    location: "Mumbai"
                },
                {
                    id: "7",
                    designation: "Web Developer",
                    organisation: "Zeuslearning",
                    from: "2009-07-01",
                    to: "2011-12-31",
                    description: "Developed Flash/AS3 learning modules before transitioning to HTML-based development.\n\nContributed to major conversion projects modernizing legacy Flash content.",
                    shortDescription: "Developed Flash/AS3 learning modules and contributed to major projects converting legacy Flash content to modern HTML-based formats.",
                    location: "Mumbai"
                }
            ]);

            const addRow = () => {
                setRows((prev) => [
                    ...prev,
                    {
                        id: Math.random().toString(36).substring(7),
                        designation: "",
                        organisation: "",
                        from: "",
                        to: "",
                        description: "",
                        shortDescription: "",
                        location: "",
                    },
                ]);
            };

            const updateRow = (id, field, value) => {
                setRows((prev) =>
                    prev.map((row) => (row.id === id ? { ...row, [field]: value } : row))
                );
            };

            const copyToClipboard = (text, label) => {
                if (!text) {
                    addToast(`Please enter a ${label} to copy`, "error");
                    return;
                }
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text)
                        .then(() => addToast(`${label} copied to clipboard`, "success"))
                        .catch(() => fallbackCopy(text, label));
                } else {
                    fallbackCopy(text, label);
                }
            };

            const fallbackCopy = (text, label) => {
                try {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    textArea.style.position = "fixed";
                    textArea.style.left = "-9999px";
                    textArea.style.top = "0";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    const successful = document.execCommand('copy');
                    document.body.removeChild(textArea);
                    if (successful) {
                        addToast(`${label} copied to clipboard`, "success");
                    } else {
                        addToast("Failed to copy text", "error");
                    }
                } catch (err) {
                    addToast("Failed to copy text", "error");
                }
            };

            return (
                <div className="min-h-screen w-full bg-white p-4 md:p-8">
                    <div className="container mx-auto max-w-7xl">

                        {/* Header row with title and toggle */}
                        <div className="mb-8 flex items-center justify-between flex-wrap gap-4">
                            <h1 className="text-3xl font-bold tracking-tight text-slate-900">
                                Experience Details
                            </h1>
                            <label className="flex items-center gap-3 cursor-pointer select-none">
                                <span className="text-sm font-medium text-slate-600">Full description</span>
                                <label className="toggle-switch">
                                    <input
                                        type="checkbox"
                                        checked={shortMode}
                                        onChange={(e) => setShortMode(e.target.checked)}
                                    />
                                    <span className="toggle-slider"></span>
                                </label>
                                <span className={`text-sm font-medium ${shortMode ? "text-slate-900" : "text-slate-400"}`}>
                                    Short (&lt;255 chars)
                                </span>
                            </label>
                        </div>

                        <div className="w-full space-y-4">
                            <div className="rounded-md border border-slate-200">
                                <div className="relative w-full overflow-x-auto">
                                    <table className="w-full caption-bottom text-sm text-left">
                                        <thead className="[&_tr]:border-b border-slate-200">
                                            <tr className="border-b transition-colors hover:bg-slate-100/50">
                                                <th className="h-12 px-4 text-left align-middle font-medium text-slate-500 w-[15%] min-w-[150px]">Designation</th>
                                                <th className="h-12 px-4 text-left align-middle font-medium text-slate-500 w-[15%] min-w-[150px]">Organisation</th>
                                                <th className="h-12 px-4 text-left align-middle font-medium text-slate-500 w-[12%] min-w-[120px]">From</th>
                                                <th className="h-12 px-4 text-left align-middle font-medium text-slate-500 w-[12%] min-w-[120px]">To</th>
                                                <th className="h-12 px-4 text-left align-middle font-medium text-slate-500 w-[30%] min-w-[200px]">
                                                    {shortMode ? "Description (short)" : "Description"}
                                                </th>
                                                <th className="h-12 px-4 text-left align-middle font-medium text-slate-500 w-[15%] min-w-[150px]">Location</th>
                                            </tr>
                                        </thead>
                                        <tbody className="[&_tr:last-child]:border-0">
                                            {rows.map((row) => {
                                                const descField = shortMode ? "shortDescription" : "description";
                                                const descValue = shortMode ? row.shortDescription : row.description;
                                                return (
                                                    <tr key={row.id} className="border-b border-slate-200 transition-colors hover:bg-slate-100/50">
                                                        <td className="p-4 align-top">
                                                            <div className="flex items-center gap-2">
                                                                <Input
                                                                    value={row.designation}
                                                                    onChange={(e) => updateRow(row.id, "designation", e.target.value)}
                                                                    placeholder="Designation"
                                                                    className="min-w-[120px]"
                                                                />
                                                                <Button variant="ghost" size="icon" onClick={() => copyToClipboard(row.designation, "Designation")} title="Copy Designation">
                                                                    <CopyIcon className="h-4 w-4" />
                                                                </Button>
                                                            </div>
                                                        </td>
                                                        <td className="p-4 align-top">
                                                            <div className="flex items-center gap-2">
                                                                <Input
                                                                    value={row.organisation}
                                                                    onChange={(e) => updateRow(row.id, "organisation", e.target.value)}
                                                                    placeholder="Organisation"
                                                                    className="min-w-[120px]"
                                                                />
                                                                <Button variant="ghost" size="icon" onClick={() => copyToClipboard(row.organisation, "Organisation")} title="Copy Organisation">
                                                                    <CopyIcon className="h-4 w-4" />
                                                                </Button>
                                                            </div>
                                                        </td>
                                                        <td className="p-4 align-top">
                                                            <Input
                                                                type="date"
                                                                value={row.from}
                                                                onChange={(e) => updateRow(row.id, "from", e.target.value)}
                                                                className="min-w-[110px]"
                                                            />
                                                        </td>
                                                        <td className="p-4 align-top">
                                                            <Input
                                                                type="date"
                                                                value={row.to}
                                                                onChange={(e) => updateRow(row.id, "to", e.target.value)}
                                                                className="min-w-[110px]"
                                                            />
                                                        </td>
                                                        <td className="p-4 align-top">
                                                            <div className="flex items-start gap-2">
                                                                <div className="flex-1 min-w-[180px]">
                                                                    <Textarea
                                                                        value={descValue}
                                                                        onChange={(e) => updateRow(row.id, descField, e.target.value)}
                                                                        placeholder={shortMode ? "Short description (max 255 chars)" : "Description"}
                                                                        maxLength={shortMode ? 255 : undefined}
                                                                        className="min-h-[80px] w-full"
                                                                    />
                                                                    {shortMode && (
                                                                        <div className={`text-xs mt-1 text-right ${descValue.length >= 255 ? "text-red-500 font-medium" : "text-slate-400"}`}>
                                                                            {descValue.length} / 255
                                                                        </div>
                                                                    )}
                                                                </div>
                                                                <Button variant="ghost" size="icon" onClick={() => copyToClipboard(descValue, "Description")} title="Copy Description" className="mt-1 flex-shrink-0">
                                                                    <CopyIcon className="h-4 w-4" />
                                                                </Button>
                                                            </div>
                                                        </td>
                                                        <td className="p-4 align-top">
                                                            <div className="flex items-center gap-2">
                                                                <Input
                                                                    value={row.location}
                                                                    onChange={(e) => updateRow(row.id, "location", e.target.value)}
                                                                    placeholder="Location"
                                                                    className="min-w-[120px]"
                                                                />
                                                                <Button variant="ghost" size="icon" onClick={() => copyToClipboard(row.location, "Location")} title="Copy Location">
                                                                    <CopyIcon className="h-4 w-4" />
                                                                </Button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            <div className="flex justify-end">
                                <Button onClick={addRow} className="gap-2">
                                    <PlusIcon className="h-4 w-4" /> Add Experience
                                </Button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(
            <ToastProvider>
                <App />
            </ToastProvider>
        );
    </script>
</body>
</html>
