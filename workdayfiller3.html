<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JSON Table Viewer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    .toggle-group input {
      width: auto;
    }

h2 {
  margin-bottom: 10px;
}

.toggle-group {
  margin-bottom: 15px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
  vertical-align: top;
}

th {
  background: #f0f0f0;
  text-align: left;
}

input, textarea {
  width: 100%;
  box-sizing: border-box;
  padding: 5px;
}

textarea {
  resize: vertical;
  min-height: 60px;
}

.cell-wrapper {
  display: flex;
  gap: 5px;
}

button {
  padding: 4px 8px;
  cursor: pointer;
}


  </style>
</head>
<body>

<div class="toggle-group">

    <input type="radio" name="descToggle" value="full" checked>
    Full Description
  </label>
  <label style="margin-left: 10px;">
    <input type="radio" name="descToggle" value="short">
    Short Description

</div>

<table id="dataTable">
  <thead></thead>
  <tbody></tbody>
</table>

<script>

];

let useShort = false;

const tableHead = document.querySelector("#dataTable thead");
const tableBody = document.querySelector("#dataTable tbody");

// Build table headers dynamically
function buildHeader() {
  const keys = Object.keys(data[0]).filter(k => k !== "description" && k !== "shortDescription");

  keys.push("description"); // single column for toggled content

  const tr = document.createElement("tr");

  keys.forEach(key => {
    const th = document.createElement("th");
    th.textContent = key;
    tr.appendChild(th);
  });

  tableHead.innerHTML = "";
  tableHead.appendChild(tr);
}

// Copy helper
function copyToClipboard(value) {
  navigator.clipboard.writeText(value);
}

// Create input cell
function createInputCell(value) {
  const wrapper = document.createElement("div");
  wrapper.className = "cell-wrapper";

  let input;

  if (value.length > 50) {
    input = document.createElement("textarea");
    input.value = value;
  } else {
    input = document.createElement("input");
    input.type = "text";
    input.value = value;
  }

  const btn = document.createElement("button");
  btn.textContent = "Copy";
  btn.onclick = () => copyToClipboard(input.value);

  wrapper.appendChild(input);
  wrapper.appendChild(btn);

  return wrapper;
}

// Build rows
function buildRows() {
  tableBody.innerHTML = "";

  data.forEach(item => {
    const tr = document.createElement("tr");

    Object.keys(item).forEach(key => {
      if (key === "description" || key === "shortDescription") return;

      const td = document.createElement("td");

      if (key === "id") {
        td.textContent = item[key];
      } else {
        td.appendChild(createInputCell(item[key]));
      }

      tr.appendChild(td);
    });

    // Description column (toggle)
    const descTd = document.createElement("td");
    const value = useShort ? item.shortDescription : item.description;
    descTd.appendChild(createInputCell(value));
    tr.appendChild(descTd);

    tableBody.appendChild(tr);
  });
}

// Toggle handler
document.querySelectorAll('input[name="descToggle"]').forEach(radio => {
  radio.addEventListener("change", (e) => {
    useShort = e.target.value === "short";
    buildRows();
  });
});

// Init
buildHeader();
buildRows();
</script>

</body>
</html>
